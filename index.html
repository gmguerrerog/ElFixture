<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElFixture | Tournament Hub - Tron 2050 Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700;900&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.0">
</head>

<body>
    <!-- The Deep Grid Background -->
    <div class="void-bg"></div>
    <div class="perspective-grid"></div>

    <!-- Top Ad Banner -->
    <div class="ad-banner-top">
        <span>ESPACIO PUBLICITARIO - GOOGLE ADSENSE</span>
    </div>

    <!-- Live Feedback Scanner -->
    <div class="laser-scanner"></div>

    <!-- Epic Audio Track -->
    <audio id="epic-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mpeg">
    </audio>

    <main class="console-viewport has-ads">

        <!-- Header: Command Bar -->
        <header class="command-bar panel-glass">

            <!-- Centered Header Logo -->
            <a href="#" class="logo-container top-center" id="logo-home">
                <img src="Logo.png" alt="ElFixture Logo" class="bloom-logo xl">
            </a>

            <div class="controls-row">
                <div class="status-indicators">
                    <div class="team-size-selector">
                        <button class="mode-btn active" id="btn-8-teams">8 EQUIPOS</button>
                        <button class="mode-btn" id="btn-16-teams">16 EQUIPOS</button>
                    </div>

                    <div class="latency-sync">
                        <span class="pulse-dot active"></span>
                        <span class="orbitron-text">SYNC: 12ms (ADMIN)</span>
                    </div>

                    <div class="mode-selector">
                        <button class="mode-btn active" id="btn-football">
                            <svg viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                                <path d="M2 12h20" />
                            </svg>
                            FÚTBOL
                        </button>
                        <button class="mode-btn" id="btn-esports">
                            <svg viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor">
                                <path d="M6 12L10 8L14 12L18 8V16H6V12Z" />
                            </svg>
                            E-SPORTS
                        </button>
                    </div>
                </div>

                <div class="action-buttons-row">
                    <button class="share-btn audio-btn" id="btn-audio">
                        <span class="orbitron-text">MÚSICA: OFF</span>
                    </button>
                    <button class="share-btn" id="btn-share">
                        <span class="ripple-effect"></span>
                        <span class="orbitron-text">COMPARTIR</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Neural Input Module -->
        <section class="neural-input-module panel-glass">
            <h2 class="orbitron-text glow-text">INICIAR TORNEO</h2>
            <div class="input-grid" id="input-grid-container">
                <!-- Dynamically populated by JS -->
            </div>
            <button class="action-btn primary" id="generate-bracket">
                <span class="orbitron-text">GENERAR FIXTURE</span>
            </button>
        </section>

        <!-- The Kinetic Structure (Bracket) -->
        <section class="bracket-container" id="bracket-view" style="display: none;">
            <div class="hyper-bento-grid" id="bracket-grid">
                <!-- Dynamically populated by JS -->
            </div>
        </section>

        <!-- The Victory Vortex -->
        <div class="victory-vortex" id="victory-overlay">
            <div class="particles"></div>
            <div class="champion-display">
                <img src="Logo.png" alt="Trophy" class="trophy-bloom">
                <h1 class="orbitron-text victory-title">¡CAMPEÓN!</h1>
                <h2 class="roboto-mono winner-name">EQUIPO_ALPHA</h2>
            </div>
        </div>

    </main>

    <!-- Bottom Ad Banner -->
    <div class="ad-banner-bottom">
        <span>ESPACIO PUBLICITARIO - GOOGLE ADSENSE</span>
    </div>

    <script src="script.js?v=3.0"></script>
</body>

</html>
